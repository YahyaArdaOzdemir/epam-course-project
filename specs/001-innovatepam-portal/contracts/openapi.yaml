openapi: 3.0.3
info:
  title: InnovatEPAM Portal API
  version: 0.1.0
servers:
  - url: http://localhost:3000/api
paths:
  /auth/register:
    post:
      summary: Register local employee account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '201':
          description: Account created
        '400':
          description: Invalid input or non-corporate email domain
        '409':
          description: Duplicate account
  /auth/login:
    post:
      summary: Login and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Logout current session
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out
        '401':
          description: Unauthorized
  /ideas:
    get:
      summary: List ideas based on role/visibility
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Idea list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IdeaListItem'
    post:
      summary: Submit idea with optional single attachment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, description, category]
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Idea submitted
        '400':
          description: Validation error (including file type/size/count)
        '401':
          description: Unauthorized
  /ideas/{ideaId}/share:
    patch:
      summary: Update per-idea sharing visibility (owner only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ideaId
          required: true
          schema:
            type: string
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          description: Row version for optimistic concurrency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isShared]
              properties:
                isShared:
                  type: boolean
      responses:
        '200':
          description: Sharing updated
        '403':
          description: Forbidden
        '409':
          description: Stale update conflict
  /ideas/{ideaId}/status:
    patch:
      summary: Move idea status to Under Review or final decision (evaluator/admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: ideaId
          required: true
          schema:
            type: string
        - in: header
          name: If-Match
          required: true
          schema:
            type: string
          description: Row version for optimistic concurrency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toStatus]
              properties:
                toStatus:
                  type: string
                  enum: [Under Review, Accepted, Rejected]
                comment:
                  type: string
      responses:
        '200':
          description: Status updated
        '400':
          description: Invalid transition or missing comment for final decision
        '403':
          description: Forbidden
        '409':
          description: Stale update conflict
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    IdeaListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [Submitted, Under Review, Accepted, Rejected]
        isShared:
          type: boolean
        ownerUserId:
          type: string
        latestEvaluationComment:
          type: string
          nullable: true
